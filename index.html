<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Argopuro Walida - Redirecting...</title>
    <!-- JavaScript redirect dengan cek backend session -->
    <script>
      // Check backend session and redirect accordingly
      (async function () {
        const API_BASE_URL =
          window.API_BASE_URL ||
          (window.location.origin
            ? `${window.location.origin.replace(/:\d+$/, ":5002")}/api`
            : "http://localhost:5002/api");

        try {
          const response = await fetch(`${API_BASE_URL}/auth/session`, {
            method: "GET",
            credentials: "include",
            headers: {
              "Content-Type": "application/json",
            },
          });

          if (response.ok) {
            const result = await response.json();

            if (result.logged_in && result.username && result.role) {
              // User is logged in, redirect to dashboard based on role
              if (result.role === "Admin") {
                window.location.replace("/dashboard");
              } else if (result.role === "Owner") {
                window.location.replace("/dashboard/owner");
              } else if (result.role === "Karyawan") {
                window.location.replace("/dashboard/karyawan");
              } else {
                // Unknown role, redirect to welcome
                window.location.replace("/");
              }
              return;
            }
          }
        } catch (error) {
          console.error("Error checking session:", error);
        }

        // Not logged in or error, redirect to welcome page
        window.location.replace("/");
      })();
    </script>
    <!-- Meta refresh sebagai fallback -->
    <meta http-equiv="refresh" content="0; url=/" />
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
