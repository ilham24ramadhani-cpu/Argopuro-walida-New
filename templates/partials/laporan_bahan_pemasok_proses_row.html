{# Baris filter pemasok + proses pengolahan — ID harus tetap untuk static/js/kelola_laporan.js #}
              <div class="row gy-2 gx-3 align-items-end mb-3">
                <div class="col-md-6 col-lg-3">
                  <label
                    for="bahanFilterPemasok"
                    class="form-label small text-muted mb-1"
                    >Filter pemasok</label
                  >
                  <select
                    id="bahanFilterPemasok"
                    class="form-select form-select-sm"
                    aria-label="Filter pemasok bahan masuk"
                  >
                    <option value="">Semua pemasok</option>
                  </select>
                </div>
                <div class="col-md-6 col-lg-3">
                  <label
                    for="bahanFilterProses"
                    class="form-label small text-muted mb-1"
                    >Proses pengolahan</label
                  >
                  <select
                    id="bahanFilterProses"
                    class="form-select form-select-sm"
                    aria-label="Filter proses pengolahan bahan masuk"
                  >
                    <option value="">Semua proses</option>
                  </select>
                </div>
                <div class="col-12 col-lg-6">
                  <label
                    class="form-label small text-muted mb-1 d-block d-lg-none"
                    >Ringkasan pemasok</label
                  >
                  <p
                    class="small text-muted mb-0 mt-lg-4"
                    id="bahanPemasokInsight"
                  >
                    Memuat ringkasan pemasok…
                  </p>
                </div>
              </div>
